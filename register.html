<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SkillSync</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, aqua, aqua);
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4" style="width: 420px; border-radius: 15px;">
    <h3 class="text-center mb-4 fw-bold">Create Account</h3>

    <form onsubmit="handleRegister(event)">

      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Re-enter password" required>
      </div>

      <button type="submit" class="btn btn-success w-100 mb-3">
        Register
      </button>

      <p class="text-center mb-0">
        Already a user?
        <a href="login.html" class="fw-semibold text-decoration-none">Login</a>
      </p>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function handleRegister(event) {
      event.preventDefault();

      const form = event.target;

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      // Store user
      const user = {
        username,
        email,
        password
      };

      localStorage.setItem("user", JSON.stringify(user));

      alert("Registration Successful!");

      // ✅ Redirect to HOME instead of login
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
