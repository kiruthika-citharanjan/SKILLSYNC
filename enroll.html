<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Enrollment</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(to right, aqua, aqua);
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <!-- Enrollment Card -->
  <div class="card shadow-lg p-4" style="width: 450px; border-radius: 15px;">
    <h4 class="text-center mb-3 fw-bold">Course Enrollment</h4>

    <!-- Selected Course Display -->
    <h5 class="text-center text-primary mb-4" id="courseName"></h5>

    <form>
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" placeholder="Enter your name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <button type="button" class="btn btn-success w-100" onclick="showSuccess()">
        Confirm Enrollment
      </button>
    </form>
  </div>

  <!-- Success Modal -->
  <div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Enrollment Successful 🎉</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body text-center">
          <h4 class="text-success mb-3">Congratulations!</h4>
          <p>You have successfully enrolled in</p>
          <h5 id="selectedCourse" class="text-primary fw-bold"></h5>
        </div>

        <!-- Footer will be updated dynamically -->
        <div class="modal-footer"></div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Corrected JavaScript -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const course = params.get("course");

    // Show selected course at top
    if (course) {
      document.getElementById("courseName").textContent = decodeURIComponent(course);
    } else {
      document.getElementById("courseName").textContent = "Selected Course";
    }

    // Playlist links for each course (replace with your actual playlist IDs)
    const playlists = {
      "Web Development": "https://www.youtube.com/watch?v=SaKpzjsXSqg",
      "Data Science": "https://www.youtube.com/watch?v=QISvmiwOIYI&t=4s",
      "UI/UX Design": "https://youtu.be/h87xnT004Aw",
    };

    // Show success modal
    function showSuccess() {
      const selected = decodeURIComponent(course || "Selected Course");
      document.getElementById("selectedCourse").textContent = selected;

      // Update footer button dynamically
      const footer = document.querySelector("#successModal .modal-footer");
      footer.innerHTML = `
        <a href="${playlists[selected] || 'https://www.youtube.com'}" 
           class="btn btn-danger" target="_blank">
          Watch ${selected} Videos
        </a>
      `;

      const modal = new bootstrap.Modal(document.getElementById("successModal"));
      modal.show();
    }
  </script>

</body>
</html>
